name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/portfolio

jobs:
  # ── 1. Build multi-arch image and push to GHCR ──────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    environment: Prod
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          # Layer cache via GitHub Actions cache — speeds up repeat builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. SSH into OCI instance and redeploy ───────────────────────────────────
  deploy:
    name: Deploy to OCI
    needs: build
    runs-on: ubuntu-latest
    environment: Prod

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          # Variables listed here are injected into the remote shell session.
          envs: GHCR_TOKEN,GITHUB_ACTOR,DOCKER_IMAGE,ADMIN_SECRET
          script: |
            set -euo pipefail

            # Authenticate against GHCR (needed if package is private)
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            # Pull the new image
            docker pull "$DOCKER_IMAGE"

            # Stop + remove existing container (ignore errors if not running)
            docker stop portfolio 2>/dev/null || true
            docker rm   portfolio 2>/dev/null || true

            # Run new container
            # - data/ is the persistent admin-written config volume
            # - ADMIN_SECRET comes from GitHub Secrets, never stored on disk
            mkdir -p /opt/portfolio/data
            docker run -d \
              --name portfolio \
              --restart unless-stopped \
              -p 80:4321 \
              -v /opt/portfolio/data:/app/data \
              -e ADMIN_SECRET="$ADMIN_SECRET" \
              "$DOCKER_IMAGE"

            # Clean up dangling images to reclaim disk space
            docker image prune -f

            echo "✓ Deployed $DOCKER_IMAGE"
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          DOCKER_IMAGE: ${{ env.IMAGE }}:latest
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
